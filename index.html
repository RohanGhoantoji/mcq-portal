<!DOCTYPE html>
<html>
<head>
<title>MCQ Portal</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
margin:0;
}

.container{
max-width:700px;
margin:auto;
padding:20px;
}

button{
padding:12px 20px;
margin:10px;
font-size:16px;
border:none;
border-radius:8px;
cursor:pointer;
background:#22c55e;
color:white;
}

.option{
display:block;
background:#1e293b;
margin:10px;
padding:12px;
border-radius:8px;
cursor:pointer;
}

.timer{
font-size:20px;
color:#facc15;
}

.hidden{
display:none;
}
</style>
</head>

<body>

<div class="container">

<h1>📘 MCQ Learning Portal</h1>

<div id="home">
<h2>Select Chapter</h2>

<button onclick="startQuiz(1)">
Encoding Schemes & Number System
</button>

<button onclick="startQuiz(2)">
Emerging Trends
</button>
</div>

<div id="quiz" class="hidden">
<div class="timer" id="timer"></div>
<h2 id="question"></h2>
<div id="options"></div>
<button onclick="nextQuestion()">Submit</button>
</div>

<div id="result" class="hidden">
<h2>✅ Quiz Completed</h2>
<p id="score"></p>
<p id="timeTaken"></p>
<button onclick="location.reload()">Home</button>
</div>

</div>

<script>

let questions=[];
let index=0;
let score=0;
let selected=null;
let startTime;
let timerInterval;

const chapter1=[
{q:"Which number system uses only two symbols?",o:["Decimal","Binary","Octal","Hexadecimal"],a:1},
{q:"Radix of Octal system?",o:["2","8","10","16"],a:1},
{q:"Decimal of (11010)₂ ?",o:["24","25","26","27"],a:2},
{q:"Binary of 45?",o:["101101","110101","100101","111001"],a:0},
{q:"Bits in one byte?",o:["4","8","16","32"],a:1}
];

const chapter2=[
{q:"AI refers to?",o:["Human intelligence","Machine intelligence","Natural intelligence","Manual processing"],a:1},
{q:"Example of AI?",o:["Calculator","Voice Assistant","Keyboard","Printer"],a:1},
{q:"IoT stands for?",o:["Internet Technology","Internet of Things","Integration Things","Interface Things"],a:1},
{q:"VR means?",o:["Visual Reality","Virtual Reality","Verified Reality","Variable Reality"],a:1},
{q:"Cloud computing allows?",o:["Local storage","Internet access resources","Hardware only","Disconnect networks"],a:1}
];

function startQuiz(ch){
document.getElementById("home").classList.add("hidden");
document.getElementById("quiz").classList.remove("hidden");

questions = ch===1 ? chapter1 : chapter2;

startTime=new Date();

timerInterval=setInterval(updateTimer,1000);

loadQuestion();
}

function updateTimer(){
let now=new Date();
let diff=2400-Math.floor((now-startTime)/1000);

let m=Math.floor(diff/60);
let s=diff%60;

document.getElementById("timer").innerText=
"Time Left: "+m+":"+s;

if(diff<=0) finishQuiz();
}

function loadQuestion(){
selected=null;
let q=questions[index];
document.getElementById("question").innerText=
(index+1)+". "+q.q;

let optHTML="";
q.o.forEach((opt,i)=>{
optHTML+=
`<div class="option"
onclick="selectOption(${i},this)">
${opt}
</div>`;
});

document.getElementById("options").innerHTML=optHTML;
}

function selectOption(i,el){
selected=i;
document.querySelectorAll(".option")
.forEach(o=>o.style.background="#1e293b");

el.style.background="#22c55e";
}

function nextQuestion(){

if(selected===questions[index].a)
score++;

index++;

if(index<questions.length)
loadQuestion();
else
finishQuiz();
}

function finishQuiz(){

clearInterval(timerInterval);

document.getElementById("quiz")
.classList.add("hidden");

document.getElementById("result")
.classList.remove("hidden");

let end=new Date();
let time=Math.floor((end-startTime)/1000);

document.getElementById("score")
.innerText="Score: "+score+
" / "+questions.length;

document.getElementById("timeTaken")
.innerText="Time Taken: "+time+" seconds";
}

</script>

</body>
</html>
