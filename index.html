<!DOCTYPE html>
<html>
<head>
<title>Class 11 CS MCQ Portal</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
margin:0;
}

.screen{display:none;padding:20px;}
.active{display:block;}

.container{
background:#1e293b;
max-width:800px;
margin:auto;
padding:20px;
border-radius:10px;
}

button{
padding:12px 20px;
margin:10px;
font-size:16px;
background:#22c55e;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

.option{
background:#334155;
margin:8px;
padding:10px;
border-radius:6px;
cursor:pointer;
}

.timer{
color:#facc15;
font-size:20px;
margin:10px;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="screen active">
<div class="container">
<h1>📘 Class 11 CS MCQ Portal</h1>
<h2>Select Chapter</h2>

<button onclick="startQuiz(ch1)">Chapter 1 - Computer System</button>
<button onclick="startQuiz(ch2)">Chapter 2 - Number System</button>
<button onclick="startQuiz(ch3)">Chapter 3 - Emerging Trends</button>

</div>
</div>

<!-- QUIZ -->
<div id="quizScreen" class="screen">
<div class="timer" id="timer"></div>
<div class="container" id="quizBox"></div>
</div>

<script>

let questions=[];
let index=0;
let score=0;
let answers=[];
let timerInterval;

/* ---------- CHAPTER 1 ---------- */
const ch1=[
{q:"CPU stands for?",o:["Central Processing Unit","Central Programming Unit","Computer Personal Unit","Centralized Processing Unit"],a:0},
{q:"High speed memory between CPU and main memory?",o:["Cache Memory","Secondary Memory","RAM","ROM"],a:0},
{q:"Volatile temporary memory?",o:["ROM","RAM","SSD","HDD"],a:1},
{q:"Father of Computer?",o:["William Shakespeare","Isaac Newton","Charles Babbage","None"],a:2},
{q:"Primary role of Memory Controller?",o:["Manage storage","Control CPU","Regulate power","Manage data flow"],a:3}
];

/* ---------- CHAPTER 2 ---------- */
const ch2=[
{q:"Number system using two symbols?",o:["Decimal","Binary","Octal","Hexadecimal"],a:1},
{q:"Radix of Octal system?",o:["2","8","10","16"],a:1},
{q:"Bits in one byte?",o:["4","8","16","32"],a:1},
{q:"ASCII uses?",o:["6 bits","7 bits","8 bits","16 bits"],a:1},
{q:"Hexadecimal digit F value?",o:["14","15","16","13"],a:1}
];

/* ---------- CHAPTER 3 ---------- */
const ch3=[
{q:"AI refers to?",o:["Human intelligence","Machine intelligence","Natural intelligence","Manual processing"],a:1},
{q:"Example of AI?",o:["Calculator","Voice Assistant","Keyboard","Printer"],a:1},
{q:"Machine Learning is subset of?",o:["Internet","Artificial Intelligence","Cloud","Robotics"],a:1},
{q:"IoT stands for?",o:["Internet of Technology","Integration of Things","Internet of Things","Interface of Things"],a:2},
{q:"Cloud Computing allows users to?",o:["Store locally","Access via Internet","Use hardware only","Disconnect network"],a:1}
];

function startQuiz(chapter){

questions=chapter;
index=0;
score=0;
answers=[];

document.getElementById("home").classList.remove("active");
document.getElementById("quizScreen").classList.add("active");

startTimer();
loadQuestion();
}

function loadQuestion(){

if(index>=questions.length){
showResult();
return;
}

let q=questions[index];

let html=`<h2>Question ${index+1}</h2>
<p>${q.q}</p>`;

q.o.forEach((opt,i)=>{
html+=`<div class="option"
onclick="selectAnswer(${i})">${opt}</div>`;
});

document.getElementById("quizBox").innerHTML=html;
}

function selectAnswer(choice){

answers.push(choice);

if(choice===questions[index].a)
score++;

index++;
loadQuestion();
}

function showResult(){

clearInterval(timerInterval);

let review=`<h2>Result</h2>
<h3>Score: ${score}/${questions.length}</h3>`;

questions.forEach((q,i)=>{
review+=`
<p>
Q${i+1}: ${q.q}<br>
Your Answer: ${q.o[answers[i]]||"Not Answered"}<br>
Correct: ${q.o[q.a]}
${answers[i]==q.a?" ✅":" ❌"}
</p><hr>`;
});

review+=`<button onclick="location.reload()">Back to Home</button>`;

document.getElementById("quizBox").innerHTML=review;
}

function startTimer(){

let time=2400;

timerInterval=setInterval(()=>{
let m=Math.floor(time/60);
let s=time%60;

document.getElementById("timer").innerText=
"Time Left: "+m+":"+(s<10?"0":"")+s;

time--;

if(time<0){
showResult();
}
},1000);
}

</script>

</body>
</html>
