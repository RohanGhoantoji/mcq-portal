</head>

<body>

<header>1st PUC Computer Science MCQ Portal</header>

<div class="container" id="home">

<h2>Select Chapter</h2>

<button onclick="startChapter(1)">Chapter 1</button>
<button onclick="startChapter(2)">Chapter 2</button>
<button onclick="startChapter(3)">Chapter 3</button>
<button onclick="startChapter(4)">Chapter 4</button>

<button onclick="startChapter(10)">Chapter 10</button>
<button onclick="startChapter(11)">Chapter 11</button>

</div>


<div class="container" id="quiz" style="display:none">

<div class="timer" id="timer"></div>

<h3 id="question"></h3>

<div id="options"></div>

<button onclick="nextQuestion()">Next</button>

</div>


<div class="container" id="result" style="display:none">

<h2>Quiz Completed</h2>

<p id="score"></p>

<h3>Review</h3>

<div class="review" id="review"></div>

<button onclick="location.reload()">Home</button>

</div>


<script>

],

4:[

{q:"Comment symbol?",o:["#","//","--","**"],a:0},
{q:"Variable stores?",o:["Data","Program","Device","File"],a:0},
{q:"Python file extension?",o:[".py",".java",".cpp",".txt"],a:0},

],

6:[
{q:"if statement used for?",o:["Decision","Loop","Storage","Input"],a:0},

{q:"while loop runs while?",o:["Condition true","Condition false","Always","Never"],a:0},

{q:"Control statements control?",o:["Flow of program","Memory","CPU","Keyboard"],a:0}
],

7:[
{q:"Function defined using?",o:["def","fun","define","function"],a:0},
{q:"Function is?",o:["Block of code","Memory","Variable","Device"],a:0},
{q:"Function helps?",o:["Reuse code","Delete code","Store code","Print code"],a:0},
{q:"Function call means?",o:["Executing function","Deleting function","Saving function","Stopping function"],a:0},
{q:"Parameter means?",o:["Input to function","Output","Variable","Loop"],a:0}
],

8:[

{q:"len() gives?",o:["Length","Value","Index","Type"],a:0},

],

],

11:[

{q:"Digital footprint?",o:["Online trace","Memory","Software","Hardware"],a:0},

{q:"Health issue from computers?",o:["Eye strain","Better vision","Strong muscles","Good sleep"],a:0}
]

};

let chapterQuestions=[]
let current=0
let score=0
let selected=null
let answers=[]

function startChapter(ch){

chapterQuestions=questions[ch]

document.getElementById("home").style.display="none"
document.getElementById("quiz").style.display="block"

showQuestion()

}

function showQuestion(){

let q=chapterQuestions[current]

document.getElementById("question").innerText=(current+1)+". "+q.q

let html=""

q.o.forEach((opt,i)=>{
html+=`<div class="option" onclick="selectOption(${i},this)">${opt}</div>`
})

document.getElementById("options").innerHTML=html

}

function selectOption(i,el){

selected=i

document.querySelectorAll(".option").forEach(o=>o.classList.remove("selected"))

el.classList.add("selected")

}

function nextQuestion(){

answers.push(selected)

if(selected===chapterQuestions[current].a){
score++
}

current++

if(current>=chapterQuestions.length){
finishQuiz()
}else{
showQuestion()
}

}

function finishQuiz(){

document.getElementById("quiz").style.display="none"
document.getElementById("result").style.display="block"

document.getElementById("score").innerText="Score: "+score+" / "+chapterQuestions.length

let reviewHTML=""

chapterQuestions.forEach((q,i)=>{

reviewHTML+="<p><b>"+(i+1)+". "+q.q+"</b><br>"
reviewHTML+="Correct: "+q.o[q.a]+"</p><hr>"

})

document.getElementById("review").innerHTML=reviewHTML

}

</script>

</body>
</html>
